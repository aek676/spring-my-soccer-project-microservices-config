spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://securetoken.google.com/${FIREBASE_PROJECT_ID:my-soccer-project-494521}
          jwk-set-uri: https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
  gateway:
    metrics:
      enabled: true

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:gateway}
    instance-id: ${eureka.instance.hostname}:${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

info:
  application:
    name: ${spring.application.name}
    description: Spring Cloud Gateway with Eureka

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactive-http.client: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

eureka:
  instance:
    hostname: gateway
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${HOSTNAME}:${server.port}

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
